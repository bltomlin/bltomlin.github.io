<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Higher-Lower-Game</title>
    <link href="guessGame.css" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Saira+Condensed:wght@300&display=swap" rel="stylesheet"> 
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/tsparticles@1.22.1"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/tsparticles-shape-confetti@1.7.1"></script>
    <script src="https://www.wpromotions.eu/confetti.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
  </head>
  
  <body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="bltomlin.github.io"><i class="bi bi-house"></i></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        </div>
      </div>
    </nav>

    <h1>Let's Play The Higher-Lower Game!</h1>
    <h3>Guess The Magic Number Between 1 and 100.</h3>
    <h6>
      <!-- This element will be updated from javascript with the remaining number of guesses. -->
      <span id="remining-guesses">5</span> 
      Guesses Remaining.
    </h6>

    <!-- This element's value will be checked from javascript when a new guess is made. -->

    <div class="container-sm input-group">
      <button type="button" class="btn btn-danger col-sm-4 align-self-center" onclick="handleGuess()">Make Guess!</button>
      <input id="guess-input" class="form-control col-sm-4 align-self-center" type="number" aria-label="Your guess"></input>
    </div>

     <!-- <div><button type="button" class="btn btn-outline-danger" onclick="handleGuess()">Make Guess!</button></div>  -->

    <!-- This element contains each of the possible messages to the user. We will selectively remove the "hidden" class from one element at a time using javascript. -->
    <div id="message-container" class="message-container">
      <div id="tsParticles" class="hidden"></div>
      <div id="higher-message" class="hidden"><h6>Higher ⬆️</h6></div>
      <div id="lower-message" class="hidden"><h6>Lower ⬇️</h6></div>
      <div id="win-message" class="hidden" on>
        <!-- TODO:: Add a play again button here. -->
        <p class="col fs-1">You Win!</p>
        <!-- <div id="tsparticles" class="tsparticles"></div> -->
        <button type="button" class="col btn btn-primary btn-lg btn-danger" onclick="handlePlayAgain()">Play Again!</button>
      </div>
      <div id="lose-message" class="hidden">
        <p class="col fs-1">You Lose</p>
        <!-- TODO:: Add a play again button here. -->
        <button type="button" class="col btn btn-warning" onclick="handlePlayAgain()">Play Again!</button>
      </div>
    </div>
    <script src="guessGame.js"></script>
    <script src="guessGame1.js"></script>
  </body>
</html>
